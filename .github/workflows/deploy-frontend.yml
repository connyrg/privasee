# Frontend CI — lint and build check
#
# The frontend is no longer deployed independently.  It is built and embedded
# into the backend deployment by deploy-backend.yml (which copies dist/ into
# backend/static/ before the rsconnect step).
#
# This workflow exists to catch frontend build and lint failures on PRs that
# only touch the frontend, before they reach the deploy-backend.yml workflow.

name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  pull_request:
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
