#   1. Install Node dependencies
#   2. Run ESLint / unit tests
#   3. Build the Vite production bundle (dist/)
#   4. Publish the bundle to Posit Connect using the rsconnect CLI
#
# Required GitHub secrets (set in repo Settings → Secrets):
#   POSIT_CONNECT_URL   — e.g. https://connect.example.com
#   POSIT_CONNECT_TOKEN — API key with publisher permissions
#
# TODO: add a manifest.json or app.R shim if Posit Connect requires it for
#       static React apps.

name: Deploy Frontend

on:
  push:
    branches: [main]
    paths:
      - "frontend/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # TODO: uncomment once tests exist
