# Backend CI — runs tests on every PR
#
# Deployment is done manually from Posit Workbench (no GitHub Actions needed):
#
#   pip install rsconnect-python
#   rsconnect deploy fastapi \
#     --server <POSIT_CONNECT_URL> \
#     --api-key <POSIT_CONNECT_TOKEN> \
#     --title "PrivaSee" \
#     backend/
#
# The React frontend is pre-built and committed to backend/static/ so no
# Node.js is required at deploy time.  To update the frontend build, see
# the instructions in frontend/README or run on any machine with Node:
#
#   cd frontend && npm ci && npm run build
#   rm -rf ../backend/static && cp -r dist ../backend/static
#   git add ../backend/static && git commit -m "build: update frontend"

name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: make test-all

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage_html/
