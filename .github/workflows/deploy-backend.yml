# Deploy PrivaSee FastAPI backend to Posit Connect
#
# Trigger: push to main that touches backend/, PR that touches backend/,
#          or manual dispatch.
#
# Jobs:
#   test   — always runs; blocks deployment if it fails
#   deploy — runs only on push to main after test passes
#
# Required GitHub secrets:
#   POSIT_CONNECT_URL        — e.g. https://connect.example.com
#   POSIT_CONNECT_TOKEN      — API key with publisher permissions
#   DATABRICKS_HOST          — injected as an env var on the Connect content item
#   DATABRICKS_TOKEN         — injected as an env var on the Connect content item
#   DATABRICKS_MODEL_ENDPOINT
#   UC_VOLUME_PATH
#   ALLOWED_ORIGINS

name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    paths:
      - "backend/**"
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: make test-all

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: backend/coverage_html/

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Deployment steps to Posit Connect go here — these depend on your
      # organisation's Posit Connect deployment method and will need to be
      # configured with your platform team.
      #
      # Example using rsconnect-python:
      #
      # - name: Install rsconnect
      #   run: pip install rsconnect-python
      #
      # - name: Deploy to Posit Connect
      #   env:
      #     CONNECT_SERVER: ${{ secrets.POSIT_CONNECT_URL }}
      #     CONNECT_API_KEY: ${{ secrets.POSIT_CONNECT_TOKEN }}
      #   run: |
      #     rsconnect deploy fastapi \
      #       --server "$CONNECT_SERVER" \
      #       --api-key "$CONNECT_API_KEY" \
      #       --title "PrivaSee API" \
      #       app/

      - name: TODO placeholder
        run: echo "Backend tests passed — Posit Connect deployment not yet configured"
